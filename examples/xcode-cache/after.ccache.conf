# ccache configuration for Xcode/Clang projects
# Place this file at: ~/.ccache/ccache.conf

# Maximum cache size (adjust based on available disk space)
max_size = 10G

# Use hash-based storage (more reliable than file-based for Clang)
hash_dir = false

# Cache directory (omit to use the default: ~/.cache/ccache on Linux, ~/.ccache on macOS)
# cache_dir = /absolute/path/to/cache   # use an absolute path if you need to override

# Enable direct mode for faster cache lookups
direct_mode = true

# Compress cached objects to save disk space
compression = true
compression_level = 1

# Log cache statistics (optional — disable in production for speed)
# stats_log = ~/.ccache/stats.log
